apiVersion: apps/v1
kind: Deployment
metadata:
  name: snapverse-ai
  namespace: snapverse
  labels:
    app: snapverse-ai
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: snapverse-ai
  template:
    metadata:
      labels:
        app: snapverse-ai
    spec:
      containers:
      - name: snapverse-ai
        image: h8815/ai-reel-generator:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 5000
          name: http
        envFrom:
        - configMapRef:
            name: snapverse-config
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "2Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /
            port: 5000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /
            port: 5000
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        volumeMounts:
        - name: static-storage
          mountPath: /app/static
        - name: uploads-storage
          mountPath: /app/user_uploads
      volumes:
      - name: static-storage
        persistentVolumeClaim:
          claimName: snapverse-static-pvc
      - name: uploads-storage
        persistentVolumeClaim:
          claimName: snapverse-uploads-pvc
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: snapverse-static-pvc
  namespace: snapverse
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 10Gi
  storageClassName: standard
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: snapverse-uploads-pvc
  namespace: snapverse
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 20Gi
  storageClassName: standard
