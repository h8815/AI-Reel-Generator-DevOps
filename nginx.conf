# ================================
# 🚫 BLOCK DIRECT IP ACCESS
# ================================
server {
    listen 80 default_server;
    server_name _;
    return 444;
}

# ================================
# 🌐 MAIN HTTP SERVER (NO HTTPS YET)
# ================================
server {
    listen 80;
    server_name reel.cybrmoon.space www.reel.cybrmoon.space;

    # BLOCK WRONG HOST HEADERS
    if ($host !~ ^(reel\.cybrmoon\.space|www\.reel\.cybrmoon\.space)$ ) {
        return 444;
    }

    # FILE UPLOAD LIMIT
    client_max_body_size 200M;

    # TIMEOUTS
    proxy_connect_timeout 1800s;
    proxy_send_timeout 1800s;
    proxy_read_timeout 1800s;
    send_timeout 1800s;

    # LOGS
    access_log /var/log/nginx/snapverse_access.log;
    error_log  /var/log/nginx/snapverse_error.log;

    # MAIN APP (FLASK / GUNICORN)
    # All requests including static files and uploads are served by Flask/Gunicorn
    location / {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_buffering off;
        proxy_request_buffering off;
    }
}

