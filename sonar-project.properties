# SonarQube Project Configuration
sonar.projectKey=snapverse-ai
sonar.projectName=SnapVerse AI - Reel Generator
sonar.projectVersion=1.0

# Source code location
sonar.sources=.
sonar.sourceEncoding=UTF-8

# Exclusions
sonar.exclusions=**/venv/**,**/tests/**,**/static/**,**/user_uploads/**,**/__pycache__/**,**/node_modules/**

# Test coverage
sonar.python.coverage.reportPaths=coverage.xml
sonar.python.xunit.reportPath=test-results.xml

# Python specific
sonar.language=py
sonar.python.version=3.12

# Code analysis
sonar.qualitygate.wait=true
sonar.qualitygate.timeout=300

# Security
sonar.security.hotspots.enabled=true

# Duplications
sonar.cpd.exclusions=**/tests/**

# Issues
sonar.issue.ignore.multicriteria=e1,e2

# Ignore specific rules
sonar.issue.ignore.multicriteria.e1.ruleKey=python:S1192
sonar.issue.ignore.multicriteria.e1.resourceKey=**/*.py

sonar.issue.ignore.multicriteria.e2.ruleKey=python:S125
sonar.issue.ignore.multicriteria.e2.resourceKey=**/*.py
