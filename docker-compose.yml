version: "3.8"

services:
  # Main Application
  snapverse-ai:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: snapverse-ai
    ports:
      - "5000:5000"
    volumes:
      - ./static:/app/static
      - ./user_uploads:/app/user_uploads
    environment:
      - FLASK_ENV=development
      - FLASK_DEBUG=1
      - BAIRAN_EFFECT_API_URL=http://bairaneffect:3001/process
      - BAIRAN_EFFECT_TIMEOUT=1800
    depends_on:
      - bairaneffect
    networks:
      - snapverse-network
    restart: unless-stopped

  # Bairan Effect processing service
  bairaneffect:
    build:
      context: ./bairaneffect
      dockerfile: Dockerfile
    container_name: bairaneffect
    environment:
      - PORT=3001
      - GENERATED_DIR=/app/user_uploads/bairaneffect_output
      - FAL_KEY=${FAL_KEY:-93d0b093-2310-4c07-bc68-0ffaa5f5ddeb:096081c250101606a25edb2132ba55dc}
    volumes:
      - ./user_uploads:/app/user_uploads
    networks:
      - snapverse-network
    restart: unless-stopped

  # SonarQube for Code Quality
  sonarqube:
    image: sonarqube:community
    container_name: sonarqube
    ports:
      - "9000:9000"
    environment:
      - SONAR_ES_BOOTSTRAP_CHECKS_DISABLE=true
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_extensions:/opt/sonarqube/extensions
      - sonarqube_logs:/opt/sonarqube/logs
    networks:
      - snapverse-network
    restart: unless-stopped

  # PostgreSQL for SonarQube
  sonarqube-db:
    image: postgres:15-alpine
    container_name: sonarqube-db
    environment:
      - POSTGRES_USER=sonar
      - POSTGRES_PASSWORD=sonar
      - POSTGRES_DB=sonarqube
    volumes:
      - postgresql_data:/var/lib/postgresql/data
    networks:
      - snapverse-network
    restart: unless-stopped

  # Trivy Server (Optional - for faster scans)
  trivy:
    image: aquasec/trivy:latest
    container_name: trivy-server
    command: server --listen 0.0.0.0:8080
    ports:
      - "8080:8080"
    volumes:
      - trivy_cache:/root/.cache/trivy
    networks:
      - snapverse-network
    restart: unless-stopped

networks:
  snapverse-network:
    driver: bridge

volumes:
  sonarqube_data:
  sonarqube_extensions:
  sonarqube_logs:
  postgresql_data:
  trivy_cache:
